<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voting Results</title>

<style>
    body {
        font-family: Arial;
        background: linear-gradient(to right, #4facfe, #00f2fe);
        margin: 0;
        padding: 0;
        text-align: center;
        color: white;
    }

    h1 {
        padding: 20px;
    }

    #results {
        padding: 10px;
    }

    .card {
        background: white;
        color: black;
        margin: 15px auto;
        padding: 15px;
        border-radius: 10px;
        width: 85%;
        max-width: 600px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        text-align: left;
    }

    .position {
        font-size: 18px;
        font-weight: bold;
        color: #007BFF;
        margin-bottom: 10px;
    }

    .winner {
        color: green;
        font-weight: bold;
    }
</style>

</head>
<body>

<h1>Voting Results</h1>
<div id="results">Loading...</div>

<script>
const sheetURL = "https://script.google.com/macros/s/AKfycbzfm04kCQI0RpSECtStylcTvMaRcpEvpEvhP2Kkm_kJgH_VCV6NXYRg9y6bFq9zr_NlKA/exec";

fetch(sheetURL)
.then(res => res.text())
.then(data => {
    const rows = data.trim().split("\n").map(r => r.split(","));
    const headers = rows[0];
    const resultsDiv = document.getElementById("results");

    let votes = {};

    // Count votes
    for (let i = 1; i < rows.length; i++) {
        for (let j = 0; j < headers.length; j++) {
            let candidate = rows[i][j]?.trim();

            if (!candidate) continue;

            if (!votes[headers[j]]) {
                votes[headers[j]] = {};
            }

            if (!votes[headers[j]][candidate]) {
                votes[headers[j]][candidate] = 0;
            }

            votes[headers[j]][candidate]++;
        }
    }

    resultsDiv.innerHTML = "";

    // Display results
    for (let position in votes) {
        let card = document.createElement("div");
        card.className = "card";

        let html = `<div class="position">${position}</div>`;

        // Find winner
        let maxVotes = 0;
        let winner = "";

        for (let name in votes[position]) {
            if (votes[position][name] > maxVotes) {
                maxVotes = votes[position][name];
                winner = name;
            }
        }

        for (let name in votes[position]) {
            let isWinner = name === winner ? "winner" : "";
            html += `<p class="${isWinner}">${name} - ${votes[position][name]} votes</p>`;
        }

        card.innerHTML = html;
        resultsDiv.appendChild(card);
    }
})
.catch(err => {
    document.getElementById("results").innerHTML = "Error loading data";
    console.error(err);
});
</script>

</body>
</html>
