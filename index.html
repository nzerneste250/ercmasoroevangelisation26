<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voting Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

header {
    text-align: center;
    padding: 15px;
    font-size: 22px;
    background: #1e293b;
}

.container {
    padding: 15px;
}

.card {
    background: #1e293b;
    border-radius: 10px;
    padding: 15px;
    margin-bottom: 15px;
}

h2 {
    color: #38bdf8;
    font-size: 18px;
}

.winner {
    color: #4ade80;
    font-size: 14px;
}

.rank {
    font-size: 13px;
    margin-top: 10px;
}

.toggle {
    color: #38bdf8;
    cursor: pointer;
    font-size: 13px;
    margin-top: 10px;
    display: inline-block;
}

.chart-box {
    width: 100%;
    max-width: 300px;
    margin-top: 10px;
    display: none;
}
</style>
</head>

<body>

<header>📊 Voting Results</header>

<div class="container" id="results"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzuvM0bqNzQ2PKrPvv3eDPz45mFvaSm0-eITT33VRZCILxfgZ4ZbZiz954boMeRk2AHuA/exec";

const positions = [
"President",
"Vice president",
"Secretary & accountant",
"Head of Christian",
"Social affairs",
"Intercessor",
"Communication and sound engineer",
"Advisor",
"Chief usher",
"Evangelist",
"Leader of burakeye"
];

function loadData() {

fetch(API_URL)
.then(res => res.json())
.then(data => {

    const container = document.getElementById("results");
    container.innerHTML = "";

    positions.forEach(position => {

        let info = data[position] || { candidates: [], winner: null };
        let candidates = info.candidates || [];

        let card = document.createElement("div");
        card.className = "card";

        let title = `<h2>${position}</h2>`;

        let winnerText = info.winner
            ? `<div class="winner">🏆 ${info.winner.name} (${info.winner.percent}%)</div>`
            : `<div class="winner">No votes yet</div>`;

        // TEXT RESULTS (IMPORTANT)
        let rankHTML = candidates.length > 0
            ? candidates.map((c,i)=>
                `${i+1}. ${c.name} — ${c.percent}%`
              ).join("<br>")
            : "No data";

        let chartBox = document.createElement("div");
        chartBox.className = "chart-box";

        let canvas = document.createElement("canvas");
        chartBox.appendChild(canvas);

        let toggle = document.createElement("div");
        toggle.className = "toggle";
        toggle.innerText = "Show Chart";

        card.innerHTML = title + winnerText + `<div class="rank">${rankHTML}</div>`;
        card.appendChild(toggle);
        card.appendChild(chartBox);

        container.appendChild(card);

        // Only create chart if data exists
        if (candidates.length > 0) {

            let chart = new Chart(canvas, {
                type: 'pie',
                data: {
                    labels: candidates.map(c=>c.name),
                    datasets: [{
                        data: candidates.map(c=>c.percent)
                    }]
                }
            });

            toggle.onclick = () => {
                if (chartBox.style.display === "none") {
                    chartBox.style.display = "block";
                    toggle.innerText = "Hide Chart";
                } else {
                    chartBox.style.display = "none";
                    toggle.innerText = "Show Chart";
                }
            };
        }

    });

});

}

// refresh every 5 sec
setInterval(loadData, 5000);
loadData();

</script>

</body>
</html>
