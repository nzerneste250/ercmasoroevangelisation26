<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Voting Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f172a,#020617);
    color: white;
}

header {
    text-align: center;
    padding: 20px;
    font-size: 26px;
    font-weight: bold;
    background: rgba(255,255,255,0.05);
}

.container {
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(350px,1fr));
    gap: 20px;
}

.card {
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

h2 {
    color: #38bdf8;
}

.winner {
    margin: 10px 0;
    color: #4ade80;
}

.rank {
    font-size: 14px;
    margin-top: 10px;
}

button {
    margin-top: 10px;
    padding: 8px;
    border: none;
    background: #38bdf8;
    color: black;
    border-radius: 5px;
    cursor: pointer;
}

.error {
    text-align: center;
    color: red;
    font-weight: bold;
}
</style>
</head>

<body>

<header>🚀 Live Voting Results Dashboard</header>

<div class="container" id="results"></div>

<script>

// ✅ PUT YOUR APPS SCRIPT URL HERE
const API_URL = "https://script.google.com/macros/s/AKfycbzuvM0bqNzQ2PKrPvv3eDPz45mFvaSm0-eITT33VRZCILxfgZ4ZbZiz954boMeRk2AHuA/exec";

function loadData() {

fetch(API_URL)
.then(res => res.json())
.then(data => {

    const container = document.getElementById("results");
    container.innerHTML = "";

    Object.keys(data).forEach(position => {

        let info = data[position];
        let candidates = info.candidates;

        // skip if no votes
        if (!candidates || candidates.length === 0) return;

        let labels = candidates.map(c => c.name);
        let values = candidates.map(c => c.percent);

        let winner = info.winner;

        // Create card
        let card = document.createElement("div");
        card.className = "card";

        let title = `<h2>${position}</h2>`;

        let winText = winner
            ? `<div class="winner">🏆 Winner: ${winner.name} (${winner.percent}%)</div>`
            : `<div class="winner">No winner yet</div>`;

        let rankList = candidates.map((c,i)=>
            `${i+1}. ${c.name} - ${c.percent}%`
        ).join("<br>");

        let rankHTML = `<div class="rank">${rankList}</div>`;

        let canvas = document.createElement("canvas");

        let btn = document.createElement("button");
        btn.innerText = "Switch Chart";

        let chartType = "bar";

        card.innerHTML = title + winText + rankHTML;
        card.appendChild(canvas);
        card.appendChild(btn);

        container.appendChild(card);

        let chart = new Chart(canvas, {
            type: chartType,
            data: {
                labels: labels,
                datasets: [{
                    data: values,
                    backgroundColor: [
                        "#38bdf8",
                        "#facc15",
                        "#f87171",
                        "#4ade80",
                        "#a78bfa",
                        "#fb923c"
                    ]
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, max: 100 }
                }
            }
        });

        // toggle chart type
        btn.onclick = () => {
            chart.destroy();
            chartType = chartType === "bar" ? "pie" : "bar";

            chart = new Chart(canvas, {
                type: chartType,
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: [
                            "#38bdf8",
                            "#facc15",
                            "#f87171",
                            "#4ade80",
                            "#a78bfa",
                            "#fb923c"
                        ]
                    }]
                }
            });
        };

    });

})
.catch(err => {
    document.getElementById("results").innerHTML =
        `<div class="error">❌ Failed to load data. Check API or deployment.</div>`;
    console.error(err);
});

}

// auto refresh every 5 seconds
setInterval(loadData, 5000);

// first load
loadData();

</script>

</body>
</html>
