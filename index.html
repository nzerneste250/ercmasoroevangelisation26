<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>R.A.S.A INES Committee Voting Results: 2026-2027</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f0f4f8;
    margin: 0;
    color: #333;
}

/* HEADER CENTERED */
.header {
    background: #87ceeb;
    text-align: center;
    padding: 15px;
}

.header img {
    height: 60px;
}

.header h1 {
    margin: 10px 0 0 0;
    color: white;
    font-size: 22px;
}

/* CARD */
.card {
    background: white;
    border-radius: 10px;
    width: 95%;
    max-width: 900px;
    margin: 20px auto;
    padding: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* POSITION */
.position {
    background: #87ceeb;
    color: white;
    font-size: 20px;
    font-weight: bold;
    padding: 10px;
    border-radius: 6px;
    text-align: center;
    margin-bottom: 10px;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #87ceeb;
    color: white;
    padding: 8px;
}

td {
    padding: 8px;
    border-bottom: 1px solid #ddd;
}

td.name {
    text-align: left;
}

/* CHART */
.chart-container {
    width: 100%;
    max-width: 250px;
    margin: 15px auto;
}

/* RESPONSIVE */
@media (max-width: 600px) {
    .header h1 {
        font-size: 18px;
    }

    th, td {
        font-size: 14px;
        padding: 6px;
    }
}
</style>

</head>
<body>

<div class="header">
    <img src="logo.png">
    <h1>R.A.S.A INES Committee Voting Results: 2026 - 2027</h1>
</div>

<div id="results">Loading...</div>

<script>

const url = "https://script.google.com/macros/s/AKfycbzOLSyPusBH6HvFc09lyagJa8crPS5I9zGs3OGeUfRvgDnlwXbcoyppYs_JApkMdC4ezQ/exec";

// Store chart instances
let charts = {};
let previousData = {};

function loadResults() {

    fetch(url)
    .then(res => res.json())
    .then(data => {

        const container = document.getElementById("results");
        container.innerHTML = "";

        for (let position in data) {

            if (!Array.isArray(data[position])) continue;

            let card = document.createElement("div");
            card.className = "card";

            let chartId = "chart_" + position.replace(/\s+/g, "_");

            let html = `<div class="position">${position}</div>`;

            // Sort
            data[position].sort((a, b) => b.votes - a.votes);

            html += `
                <table>
                    <tr>
                        <th style="text-align:left;">Name</th>
                        <th>Votes</th>
                        <th>Percentage</th>
                    </tr>
            `;

            data[position].forEach(c => {
                html += `
                    <tr>
                        <td class="name">${c.name}</td>
                        <td style="text-align:center;">${c.votes}</td>
                        <td style="text-align:center;">${c.percentage}%</td>
                    </tr>
                `;
            });

            html += `</table>`;

            html += `<div class="chart-container"><canvas id="${chartId}"></canvas></div>`;

            card.innerHTML = html;
            container.appendChild(card);

            // Detect changes (IMPORTANT)
            let currentVotes = data[position].map(c => c.votes).join(",");

            if (!charts[chartId]) {
                // FIRST TIME → create chart
                createChart(chartId, data[position]);
                previousData[chartId] = currentVotes;
            } else if (previousData[chartId] !== currentVotes) {
                // ONLY UPDATE IF DATA CHANGED
                updateChart(charts[chartId], data[position]);
                previousData[chartId] = currentVotes;
            }
        }
    })
    .catch(err => console.error(err));
}

// CREATE CHART
function createChart(id, data) {
    let ctx = document.getElementById(id).getContext("2d");

    charts[id] = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: data.map(c => c.name),
            datasets: [{
                data: data.map(c => c.votes),
                backgroundColor: generateColors(data.length)
            }]
        },
        options: {
            responsive: true,
            animation: false, // 🚫 NO MOVEMENT
            plugins: {
                legend: {
                    position: 'bottom'
                }
            }
        }
    });
}

// UPDATE CHART WITHOUT RECREATING
function updateChart(chart, data) {
    chart.data.labels = data.map(c => c.name);
    chart.data.datasets[0].data = data.map(c => c.votes);
    chart.update();
}

// GENERATE COLORS
function generateColors(count) {
    let colors = [];
    for (let i = 0; i < count; i++) {
        colors.push(`hsl(${i * 360 / count}, 70%, 60%)`);
    }
    return colors;
}

// AUTO REFRESH
loadResults();
setInterval(loadResults, 5000);

</script>

</body>
</html>
