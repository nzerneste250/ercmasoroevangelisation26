<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voting Results</title>
<style>
.table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

.table th {
    padding: 8px;
    color: white;
}

.name-col { background: #343a40; }
.vote-col { background: #007bff; }
.percentage-col { background: #28a745; }

.table td {
    padding: 8px;
    font-weight: bold;
    color: white;
    text-align: center;
}

.position {
    padding: 10px;
    border-radius: 6px;
    color: white;
    margin-bottom: 10px;
}
</style>
</head>
<body>

<h1 style="text-align: center;">Voting Results</h1>
<div id="results">Loading...</div>
<script>

const url = "https://script.google.com/macros/s/AKfycbzOLSyPusBH6HvFc09lyagJa8crPS5I9zGs3OGeUfRvgDnlwXbcoyppYs_JApkMdC4ezQ/exec";

function loadResults() {

    fetch(url)
    .then(response => response.json())
    .then(data => {

        const div = document.getElementById("results");
        div.innerHTML = "";

        if (data.error) {
            div.innerHTML = data.error;
            return;
        }

        for (let position in data) {

            if (!Array.isArray(data[position])) continue;

            let card = document.createElement("div");
            card.className = "card";

            // 🎨 ONE COLOR per position
            let colors = ["#6f42c1", "#e83e8c", "#20c997", "#fd7e14", "#007bff"];
            let posColor = colors[Math.floor(Math.random() * colors.length)];

            let html = `
                <div class="position" style="background:${posColor}">
                    ${position}
                </div>
            `;

            // sort by votes
            data[position].sort((a, b) => b.votes - a.votes);

            // group same votes
            let voteGroups = {};
            data[position].forEach(c => {
                if (!voteGroups[c.votes]) voteGroups[c.votes] = [];
                voteGroups[c.votes].push(c);
            });

            let rankColors = [
                "#28a745",
                "#007bff",
                "#ffc107",
                "#fd7e14",
                "#dc3545"
            ];

            let rankIndex = 0;

            html += `
                <table class="table">
                    <tr>
                        <th class="name-col">Candidate</th>
                        <th class="vote-col">Votes</th>
                        <th class="percentage-col">%</th>
                    </tr>
            `;

            Object.keys(voteGroups)
                .sort((a, b) => b - a)
                .forEach(vote => {

                    let rowColor = rankColors[rankIndex] || "#6c757d";

                    voteGroups[vote].forEach(c => {
                        html += `
                            <tr style="background:${rowColor}">
                                <td>${c.name}</td>
                                <td>${c.votes}</td>
                                <td>${c.percentage}%</td>
                            </tr>
                        `;
                    });

                    rankIndex++;
                });

            html += `</table>`;

            card.innerHTML = html;
            div.appendChild(card);
        }

    })
    .catch(err => {
        document.getElementById("results").innerHTML = "ERROR: " + err;
        console.error(err);
    });
}

// 🚀 Auto refresh every 5 seconds
loadResults();
setInterval(loadResults, 5000);

</script>
</body>
</html>
