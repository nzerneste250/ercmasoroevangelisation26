<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>R.A.S.A INES Committee Voting Results: 2026-2027</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f0f4f8;
    margin: 0;
    color: #333;
}

/* HEADER CENTERED */
.header {
    background: #87ceeb;
    text-align: center;
    padding: 15px;
}

.header img {
    height: 60px;
}

.header h1 {
    margin: 10px 0 0 0;
    color: white;
    font-size: 24px;
}

/* CARD */
.card {
    background: white;
    border-radius: 10px;
    width: 90%;
    max-width: 900px;
    margin: 20px auto;
    padding: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* POSITION TITLE */
.position {
    background: #87ceeb;
    color: white;
    font-size: 22px;
    font-weight: bold;
    padding: 10px;
    border-radius: 6px;
    margin-bottom: 15px;
    text-align: center;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #87ceeb;
    color: white;
    padding: 10px;
    font-size: 16px;
}

td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

/* ALIGN NAME LEFT */
td.name {
    text-align: left;
}

/* CHART */
.chart-container {
    width: 200px;
    height: 200px;
    margin: 15px auto;
}
</style>

</head>
<body>

<!-- HEADER CENTERED -->
<div class="header">
    <img src="logo.png" alt="Logo">
    <h1>R.A.S.A INES Committee Voting Results: 2026 - 2027</h1>
</div>

<div id="results">Loading...</div>

<script>

const url = "https://script.google.com/macros/s/AKfycbzOLSyPusBH6HvFc09lyagJa8crPS5I9zGs3OGeUfRvgDnlwXbcoyppYs_JApkMdC4ezQ/exec";

function loadResults() {
    fetch(url)
    .then(res => res.json())
    .then(data => {

        const div = document.getElementById("results");
        div.innerHTML = "";

        for (let position in data) {

            if (!Array.isArray(data[position])) continue;

            let card = document.createElement("div");
            card.className = "card";

            let chartId = "chart_" + position.replace(/\s+/g, "_");

            let html = `<div class="position">${position}</div>`;

            // SORT BY VOTES
            data[position].sort((a,b) => b.votes - a.votes);

            html += `
                <table>
                    <tr>
                        <th style="text-align:left;">Name</th>
                        <th>Votes</th>
                        <th>Percentage</th>
                    </tr>
            `;

            data[position].forEach(c => {
                html += `
                    <tr>
                        <td class="name">${c.name}</td>
                        <td style="text-align:center;">${c.votes}</td>
                        <td style="text-align:center;">${c.percentage}%</td>
                    </tr>
                `;
            });

            html += `</table>`;

            // PIE CHART CONTAINER
            html += `<div class="chart-container"><canvas id="${chartId}"></canvas></div>`;

            card.innerHTML = html;
            div.appendChild(card);

            // PIE CHART
            let ctx = document.getElementById(chartId).getContext("2d");

            new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: data[position].map(c => c.name),
                    datasets: [{
                        data: data[position].map(c => c.votes),
                        backgroundColor: [
                            "#007BFF",
                            "#28a745",
                            "#ffc107",
                            "#dc3545",
                            "#6f42c1",
                            "#17a2b8"
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });
        }
    })
    .catch(err => {
        document.getElementById("results").innerHTML = "ERROR: " + err;
        console.error(err);
    });
}

// AUTO REFRESH
loadResults();
setInterval(loadResults, 5000);

</script>

</body>
</html>
