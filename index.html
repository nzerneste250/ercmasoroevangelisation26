<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voting Results</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #4facfe, #00f2fe);
    margin: 0;
    text-align:left;
    color: white;
}

.card {
    background: white;
    color: black;
    margin: 15px auto;
    padding: 15px;
    border-radius: 10px;
    width: 85%;
    max-width: 600px;
}

.position {
    font-weight: bold;
    color: #007BFF;
}
</style>

</head>
<body>

<h1>Voting Results</h1>
<div id="results">Loading...</div>

<script>

const url = "https://script.google.com/macros/s/AKfycbzOLSyPusBH6HvFc09lyagJa8crPS5I9zGs3OGeUfRvgDnlwXbcoyppYs_JApkMdC4ezQ/exec";

fetch(url)
.then(response => response.json())
.then(data => {

    console.log("DATA:", data);

    const div = document.getElementById("results");
    div.innerHTML = "";

    if (data.error) {
        div.innerHTML = data.error;
        return;
    }

    for (let position in data) {

        let card = document.createElement("div");
        card.className = "card";

        let html = `<div class="position">${position}</div>`;

        // sort winners
        data[position].sort((a, b) => b.votes - a.votes);

        data[position].forEach(c => {
            html += `
                <p>
                    ${c.name} - ${c.votes} votes (${c.percentage}%)
                </p>
            `;
        });

        card.innerHTML = html;
        div.appendChild(card);
    }
})
.catch(err => {
    document.getElementById("results").innerHTML = "ERROR: " + err;
    console.error(err);
});

</script>

</body>
</html>
