<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voting Results</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #4facfe, #00f2fe);
    margin: 0;
    text-align: center;
    color: white;
}

.card {
    background: white;
    color: black;
    margin: 15px auto;
    padding: 15px;
    border-radius: 10px;
    width: 85%;
    max-width: 600px;
}

.position {
    font-weight: bold;
    margin-bottom: 10px;
    padding: 8px;
    border-radius: 5px;
    color: white;
}

/* Candidate box */
.candidate {
    padding: 10px;
    margin: 5px 0;
    border-radius: 6px;
    color: white;
    font-weight: bold;
}
</style>

</head>
<body>

<h1 style="text-align: center;">Voting Results</h1>
<div id="results">Loading...</div>
<script>

const url = "https://script.google.com/macros/s/AKfycbzOLSyPusBH6HvFc09lyagJa8crPS5I9zGs3OGeUfRvgDnlwXbcoyppYs_JApkMdC4ezQ/exec";

fetch(url)
.then(response => response.json())
.then(data => {

    console.log("DATA:", data);

    const div = document.getElementById("results");
    div.innerHTML = "";

    if (data.error) {
        div.innerHTML = data.error;
        return;
    }

    for (let position in data) {

        if (!Array.isArray(data[position])) continue;

        let card = document.createElement("div");
        card.className = "card";

        // 🎨 Random gradient for position
        let gradients = [
            "linear-gradient(45deg, #ff6a00, #ee0979)",
            "linear-gradient(45deg, #00c6ff, #0072ff)",
            "linear-gradient(45deg, #11998e, #38ef7d)",
            "linear-gradient(45deg, #fc4a1a, #f7b733)"
        ];

        let posStyle = gradients[Math.floor(Math.random() * gradients.length)];

        let html = `
            <div class="position" style="
                background:${posStyle};
                padding:10px;
                border-radius:6px;
                color:white;
            ">
                ${position}
            </div>
        `;

        // ✅ Sort by votes
        data[position].sort((a, b) => b.votes - a.votes);

        // ✅ Group candidates with same votes
        let voteGroups = {};

        data[position].forEach(c => {
            if (!voteGroups[c.votes]) voteGroups[c.votes] = [];
            voteGroups[c.votes].push(c);
        });

        // 🎨 Colors by rank
        let rankColors = [
            "#28a745", // 🟢 winner
            "#007bff", // 🔵 second
            "#ffc107", // 🟡 third
            "#fd7e14", // 🟠 fourth
            "#dc3545"  // 🔴 last
        ];

        let rankIndex = 0;

        Object.keys(voteGroups)
            .sort((a, b) => b - a)
            .forEach(vote => {

                let color = rankColors[rankIndex] || "#6c757d";

                voteGroups[vote].forEach(c => {
                    html += `
                        <div style="
                            background:${color};
                            color:white;
                            padding:10px;
                            margin:6px 0;
                            border-radius:6px;
                            font-weight:bold;
                        ">
                            ${c.name} - ${c.votes} votes (${c.percentage}%)
                        </div>
                    `;
                });

                rankIndex++;
            });

        card.innerHTML = html;
        div.appendChild(card);
    }

})
.catch(err => {
    document.getElementById("results").innerHTML = "ERROR: " + err;
    console.error(err);
});

</script>
</body>
</html>
