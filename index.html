<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voting Results</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f0f4f8;
    margin: 0;
    padding: 0;
    text-align: center;
    color: #333;
}

h1 {
    font-size: 36px;
    margin: 20px 0;
    color: #007BFF;
}

.card {
    background: white;
    border-radius: 10px;
    width: 90%;
    max-width: 800px;
    margin: 20px auto;
    padding: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.position {
    background: #87ceeb; /* sky blue */
    color: white;
    font-size: 28px;
    font-weight: bold;
    padding: 15px;
    border-radius: 6px;
    margin-bottom: 15px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #87ceeb; /* sky blue header */
    color: white;
    font-size: 20px;
    padding: 12px;
}

td {
    padding: 12px;
    font-size: 18px;
    text-align: center;
    border-bottom: 1px solid #ddd;
}

tr:nth-child(even) {
    background-color: #f2f2f2;
}

tr:hover {
    background-color: #e6f7ff;
}
</style>
</head>
<body>

<h1>Voting Results</h1>
<div id="results">Loading...</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbzOLSyPusBH6HvFc09lyagJa8crPS5I9zGs3OGeUfRvgDnlwXbcoyppYs_JApkMdC4ezQ/exec";

function loadResults() {
    fetch(url)
    .then(response => response.json())
    .then(data => {
        const div = document.getElementById("results");
        div.innerHTML = "";

        if (data.error) {
            div.innerHTML = data.error;
            return;
        }

        for (let position in data) {
            if (!Array.isArray(data[position])) continue;

            let card = document.createElement("div");
            card.className = "card";

            let html = `<div class="position">${position}</div>`;

            // Sort candidates by votes descending
            data[position].sort((a,b) => b.votes - a.votes);

            html += `
                <table>
                    <tr>
                        <th>Candidate Name</th>
                        <th>Votes</th>
                        <th>Percentage</th>
                    </tr>
            `;

            data[position].forEach(c => {
                html += `
                    <tr>
                        <td>${c.name}</td>
                        <td>${c.votes}</td>
                        <td>${c.percentage}%</td>
                    </tr>
                `;
            });

            html += `</table>`;
            card.innerHTML = html;
            div.appendChild(card);
        }
    })
    .catch(err => {
        document.getElementById("results").innerHTML = "ERROR: " + err;
        console.error(err);
    });
}

// Auto-refresh every 5 seconds
loadResults();
setInterval(loadResults, 5000);
</script>

</body>
</html>
