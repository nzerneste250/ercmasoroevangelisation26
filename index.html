<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>R.A.S.A INES Committee Voting Results: 2026-2027</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f0f4f8;
    margin: 0;
    color: #333;
}

/* HEADER */
.header {
    background: #195ef4;
    text-align: center;
    padding: 15px;
}

.header img {
    height: 60px;
}

.header h1 {
    color: white;
    font-size: 22px;
    margin: 10px 0 0 0;
}

/* CARD */
.card {
    background: white;
    border-radius: 10px;
    width: 95%;
    max-width: 900px;
    margin: 20px auto;
    padding: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* POSITION */
.position {
    background: #004f01;
    color: white;
    font-size: 20px;
    font-weight: bold;
    padding: 10px;
    border-radius: 6px;
    text-align: center;
    margin-bottom: 10px;
}

/* TOTAL VOTES */
.total-votes {
    text-align: center;
    font-weight: bold;
    font-size: 24px;
    margin-bottom: 10px;
    background: #004f01;
    padding: 8px;
    color: white;
    border-radius: 6px;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #87ceeb;
    color: white;
    padding: 8px;
}

td {
    padding: 8px;
    border-bottom: 1px solid #ddd;
}

td.name {
    text-align: left;
}

/* CHART */
.chart-container {
    width: 100%;
    max-width: 250px;
    margin: 15px auto;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 15px;
    background: #195ef4;
    color: white;
    font-size: 14px;
    margin-top: 30px;
}

/* RESPONSIVE */
@media (max-width: 600px) {
    th, td {
        font-size: 13px;
        padding: 6px;
    }

    .header h1 {
        font-size: 18px;
    }
}
</style>

</head>
<body>

<!-- HEADER -->
<div class="header">
    <img src="logo.png">
    <h1>R.A.S.A INES Committee Voting Results: 2026 - 2027</h1>
</div>

<div id="results"></div>

<!-- FOOTER -->
<div class="footer">
    © 2026 @nzernest250. All Rights Reserved.
</div>

<script>

const url = "https://script.google.com/macros/s/AKfycbzOLSyPusBH6HvFc09lyagJa8crPS5I9zGs3OGeUfRvgDnlwXbcoyppYs_JApkMdC4ezQ/exec";

let charts = {};
let dataStore = {};

function init() {
    fetch(url)
    .then(res => res.json())
    .then(data => {

        const container = document.getElementById("results");

        // CREATE UI ONLY ONCE
        if (Object.keys(charts).length === 0) {
            container.innerHTML = "";

            for (let position in data) {

                let card = document.createElement("div");
                card.className = "card";

                let chartId = "chart_" + position.replace(/\s+/g, "_");

                let html = `<div class="position">${position}</div>`;

                // Sort by votes
                data[position].sort((a, b) => b.votes - a.votes);

                // Total votes
                let totalVotes = data[position].reduce((sum, c) => sum + Number(c.votes), 0);

                html += `<div class="total-votes">Total Votes: ${totalVotes}</div>`;

                html += `
                    <table>
                        <tr>
                            <th style="text-align:left;">Name</th>
                            <th>Votes</th>
                            <th>Percentage</th>
                        </tr>
                `;

                data[position].forEach(c => {
                    html += `
                        <tr>
                            <td class="name">${c.name}</td>
                            <td style="text-align:center;">${c.votes}</td>
                            <td style="text-align:center;">${c.percentage}%</td>
                        </tr>
                    `;
                });

                html += `</table>`;

                html += `<div class="chart-container"><canvas id="${chartId}"></canvas></div>`;

                card.innerHTML = html;
                container.appendChild(card);

                // CREATE CHART
                charts[chartId] = createChart(chartId, data[position]);

                dataStore[chartId] = data[position].map(c => c.votes).join(",");
            }

        } else {

            // UPDATE ONLY DATA
            for (let position in data) {

                let chartId = "chart_" + position.replace(/\s+/g, "_");

                let newVotes = data[position].map(c => c.votes).join(",");

                if (dataStore[chartId] !== newVotes) {

                    let chart = charts[chartId];

                    chart.data.labels = data[position].map(c => c.name);
                    chart.data.datasets[0].data = data[position].map(c => c.votes);

                    chart.update();

                    dataStore[chartId] = newVotes;
                }
            }
        }

    })
    .catch(err => console.error(err));
}

// CREATE CHART
function createChart(id, data) {

    let ctx = document.getElementById(id).getContext("2d");

    return new Chart(ctx, {
        type: 'pie',
        data: {
            labels: data.map(c => c.name),
            datasets: [{
                data: data.map(c => c.votes),
                backgroundColor: generateColors(data.length)
            }]
        },
        options: {
            responsive: true,
            animation: false,
            plugins: {
                legend: {
                    position: 'bottom'
                }
            }
        }
    });
}

// COLORS
function generateColors(count) {
    let colors = [];
    for (let i = 0; i < count; i++) {
        colors.push(`hsl(${i * 360 / count}, 70%, 60%)`);
    }
    return colors;
}

// INIT + AUTO REFRESH
init();
setInterval(init, 5000);

</script>

</body>
</html>
