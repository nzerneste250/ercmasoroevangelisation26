<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Voting Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f172a,#020617);
    color: white;
}

header {
    text-align: center;
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
}

.container {
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(350px,1fr));
    gap: 20px;
}

.card {
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    padding: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

h2 {
    color: #38bdf8;
}

.winner {
    margin: 10px 0;
    font-size: 16px;
    color: #4ade80;
}

.rank {
    font-size: 14px;
    margin-top: 10px;
}

button {
    margin-top: 10px;
    padding: 8px 12px;
    border: none;
    background: #38bdf8;
    color: black;
    border-radius: 6px;
    cursor: pointer;
}
</style>
</head>

<body>

<header>Live Voting Results Dashboard</header>

<div class="container" id="results"></div>

<script>

const sheetURL = "https://script.google.com/macros/s/AKfycbzuvM0bqNzQ2PKrPvv3eDPz45mFvaSm0-eITT33VRZCILxfgZ4ZbZiz954boMeRk2AHuA/exec";

const positions = [
"President",
"Vice president",
"Secretary & accountant",
"Head of Christian",
"Social affairs",
"Intercessor",
"Communication and sound engineer",
"Advisor",
"Chief usher",
"Evangelist",
"Leader of burakeye"
];

function loadData() {

fetch(sheetURL)
.then(res => res.text())
.then(data => {

    document.getElementById("results").innerHTML = "";

    const rows = data.split("\n").map(r => r.split(","));
    const headers = rows[0];

    positions.forEach(position => {

        let index = headers.indexOf(position);
        if(index === -1) return;

        let votes = {};

        for(let i=1;i<rows.length;i++){
            let c = rows[i][index];
            if(c){
                votes[c] = (votes[c] || 0) + 1;
            }
        }

        let total = Object.values(votes).reduce((a,b)=>a+b,0);

        let sorted = Object.entries(votes)
        .map(([name,count]) => ({
            name,
            percent: ((count/total)*100).toFixed(1)
        }))
        .sort((a,b)=>b.percent - a.percent);

        let labels = sorted.map(x=>x.name);
        let values = sorted.map(x=>x.percent);

        let winner = sorted[0];

        // UI
        let card = document.createElement("div");
        card.className = "card";

        let title = `<h2>${position}</h2>`;
        let winText = `<div class="winner">🏆 Winner: ${winner.name} (${winner.percent}%)</div>`;

        let rankList = sorted.map((x,i)=>
            `${i+1}. ${x.name} - ${x.percent}%`
        ).join("<br>");

        let rankHTML = `<div class="rank">${rankList}</div>`;

        let canvas = document.createElement("canvas");

        let btn = document.createElement("button");
        btn.innerText = "Switch Chart";

        let chartType = "bar";

        card.innerHTML = title + winText + rankHTML;
        card.appendChild(canvas);
        card.appendChild(btn);

        document.getElementById("results").appendChild(card);

        let chart = new Chart(canvas, {
            type: chartType,
            data: {
                labels: labels,
                datasets: [{
                    data: values,
                    backgroundColor: ["#38bdf8","#facc15","#f87171","#4ade80","#a78bfa"]
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero:true, max:100 }
                }
            }
        });

        btn.onclick = () => {
            chart.destroy();
            chartType = chartType === "bar" ? "pie" : "bar";

            chart = new Chart(canvas, {
                type: chartType,
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: ["#38bdf8","#facc15","#f87171","#4ade80","#a78bfa"]
                    }]
                }
            });
        };

    });

});

}

// 🔄 Auto refresh every 5 seconds
setInterval(loadData, 5000);

// first load
loadData();

</script>

</body>
</html>
